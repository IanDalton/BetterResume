<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Better Resume</title>
    <script>
      // SPA fallback for GitHub Pages: preserve the requested path and
      // bounce to index.html, which restores it before React mounts.
      sessionStorage.redirect = location.href;
      location.replace(location.origin);
    </script>
  </head>
  <body></body>
</html>
